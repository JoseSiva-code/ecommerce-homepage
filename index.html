<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Homepage</title>
    
    <!-- PT: Liga o ficheiro CSS ao HTML para estilizar a página. -->
    <!-- EN: Links the CSS file to the HTML to style the page. -->
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <header>
        <h1>Urban Style</h1>

        <nav>
            <a href="#">Home</a>
            <a href="#products">Products</a>

            <!-- PT: Agrupa todos os elementos do carrinho para permitir um layout compacto no header. -->
            <!-- EN: Groups all cart elements to allow a compact layout in the header. -->
            <div class="cart-summary">
                <span id="cart-counter" aria-live="polite">Cart (0)</span>
                <!-- PT: Mostra o subtotal atual dos artigos adicionados ao carrinho. -->
                <!-- EN: Shows the current subtotal of items added to the cart. -->
                <span id="cart-subtotal" aria-live="polite">Subtotal: $0.00</span>
                <!-- PT: Mostra o valor de IVA incluído no subtotal do carrinho. -->
                <!-- EN: Shows the VAT amount included in the cart subtotal. -->
                <span id="cart-vat" aria-live="polite">VAT incl.: $0.00</span>
                <!-- PT: Permite limpar todos os produtos adicionados ao carrinho. -->
                <!-- EN: Allows clearing all products added to the cart. -->
                <button id="clear-cart-button">Clear cart</button>

                <!-- PT: Mostra os artigos adicionados para o cliente poder remover escolhas específicas. -->
                <!-- EN: Shows the added items so the customer can remove specific choices. -->
                <div id="cart-items" aria-live="polite"></div>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Discover your next favorite product</h2>
            <p>Explore curated products with a simple and smooth shopping experience.</p>
            <a href="#products">Shop now</a>
        </section>

        <!-- PT: Cria uma zona de filtros para o utilizador escolher uma categoria de produtos. -->
        <!-- EN: Creates a filter area so the user can choose a product category. -->
        <section class="filters">
            <!-- PT: Começa com o filtro "All" visualmente ativo porque todos os produtos aparecem ao carregar a página. -->
            <!-- EN: Starts with the "All" filter visually active because all products are shown when the page loads. -->
            <button class="active" data-category="all">All</button>
            <!-- PT: Botão para mostrar apenas roupa masculina. -->
            <!-- EN: Button to show only men's clothing. -->
            <button data-category="men's clothing">Men</button>

            <!-- PT: Botão para mostrar apenas roupa feminina. -->
            <!-- EN: Button to show only women's clothing. -->
            <button data-category="women's clothing">Women</button>

            <!-- PT: Botão para mostrar apenas joalharia. -->
            <!-- EN: Button to show only jewelry. -->
            <button data-category="jewelery">Jewelry</button>

            <!-- PT: Botão para mostrar apenas produtos eletrónicos. -->
            <!-- EN: Button to show only electronics products. -->
            <button data-category="electronics">Electronics</button>

            <!-- PT: Botão para mostrar apenas mochilas. -->
            <!-- EN: Button to show only backpacks. -->
            <button data-category="backpacks">Backpacks</button>
        </section>
        
        <section id="products">
        </section>
    </main>

    <!-- PT: Cria o rodapé da página com informação básica da loja. -->
    <!-- EN: Creates the page footer with basic store information. -->
    <footer>
        <!-- PT: Mostra o nome da loja no rodapé. -->
        <!-- EN: Shows the store name in the footer. -->
        <p>Urban Style</p>

        <!-- PT: Mostra uma pequena mensagem de direitos reservados. -->
        <!-- EN: Shows a short copyright message. -->
        <p>&copy; 2026 Urban Style. All rights reserved.</p>
    </footer>   
 
    <script type="module" src="main.js"></script>   
</body>
</html>
